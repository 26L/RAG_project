# HippoRAG2 외부검증 — HotpotQA(영어 다중홉). HippoRAG OpenIE 영어 네이티브(적응 불필요).
# 임베딩 e5(다른 기법과 동일, 공정). 생성·judge Gemini. PPR만 변수.
llm:
  provider: google
  model: gemini-2.5-flash
  temperature: 0.1
  max_tokens: 4096
  thinking: false
embed:
  provider: local
  model: intfloat/multilingual-e5-small
chunk_size: 1024
chunk_overlap: 64
top_k: 4
data_dir: data/hotpot
storage_dir: storage_hotpot
hipporag_embedding: text-embedding-e5
hipporag_embedding_base_url: http://127.0.0.1:8123/v1
