# HotpotQA(공개 다중홉 벤치) 검증용 — 평면검색 3종. 영어 코퍼스.
llm:
  provider: google
  model: gemini-2.5-flash
  temperature: 0.1
  max_tokens: 4096
  thinking: false
embed:
  provider: local
  model: intfloat/multilingual-e5-small
chunk_size: 1024
chunk_overlap: 64
top_k: 4
data_dir: data/hotpot400
storage_dir: storage_hotpot400
answer_style: short   # 공개벤치 EM/F1 비교용 짧은답 생성
